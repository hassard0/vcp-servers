name: conformance

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  vectors:
    name: regenerate vectors (drift check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: vectors are reproducible from generate.py
        run: |
          python conformance/generate.py
          git diff --exit-code conformance/vectors

  typescript:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: typescript } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "22" }
      - run: npm install
      - run: npm test

  python:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: python } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: python -m pip install -e ".[crypto]"
      - run: python -m unittest discover -s . -p "test_*.py" -t .

  go:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: go } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: "1.22" }
      - run: go vet ./...
      - run: go test ./...

  rust:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: rust } }
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test
